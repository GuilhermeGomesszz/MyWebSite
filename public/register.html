<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - BarberShop</title>
    <link rel="stylesheet" href="style.css"/>
    <style>
        #specialtiesGroup { display: none; }
        #specialtiesGroup.visible { display: block; }
        .text-link { color: var(--accent); cursor: pointer; transition: color var(--transition-fast); }
        .text-link:hover { color: var(--accent-hover); }
    </style>
</head>

<body>
    <div class="page-center">
        <div class="auth-card fade-in">
            <h2>Criar conta</h2>
            <p class="subtitle">Cadastre-se para comecar a agendar</p>

            <div class="form-group">
                <label class="form-label" for="name">Nome</label>
                <input id="name" class="form-input" placeholder="Seu nome completo">
            </div>

            <div class="form-group mt-md">
                <label class="form-label" for="email">Email</label>
                <input id="email" type="email" class="form-input" placeholder="seu@email.com">
            </div>

            <div class="form-group mt-md">
                <label class="form-label" for="phone">Telefone</label>
                <input id="phone" class="form-input" placeholder="(00) 00000-0000">
            </div>

            <div class="form-group mt-md">
                <label class="form-label" for="password">Senha</label>
                <input id="password" type="password" class="form-input" placeholder="Minimo 6 caracteres">
            </div>

            <div class="form-group mt-md">
                <label class="form-label" for="role">Tipo de conta</label>
                <select id="role" class="form-select" onchange="toggleSpecialties()">
                    <option value="CLIENT">Cliente</option>
                    <option value="BARBER">Barbeiro</option>
                </select>
            </div>

            <div id="specialtiesGroup" class="form-group mt-md">
                <label class="form-label" for="specialties">Especialidades</label>
                <textarea id="specialties" class="form-textarea"
                    placeholder="Separadas por virgula: Corte, Barba, Degrade"></textarea>
            </div>

            <p id="registerMessage" class="msg msg-error hidden"></p>

            <button onclick="register()" class="btn btn-primary btn-lg">
                Criar conta
            </button>

            <p class="auth-link">
                Já possui conta? <span class="text-link" onclick="goLogin()">Fazer login</span>
            </p>
        </div>
    </div>

    <script>
    function toggleSpecialties() {
        const role = document.getElementById("role").value;
        const container = document.getElementById("specialtiesGroup");
        if (role === "BARBER") {
            container.classList.add("visible");
        } else {
            container.classList.remove("visible");
        }
    }

    async function register() {
        const name = document.getElementById("name").value;
        const email = document.getElementById("email").value;
        const phone = document.getElementById("phone").value;
        const password = document.getElementById("password").value;
        const role = document.getElementById("role").value;
        const specialtiesRaw = document.getElementById("specialties").value;
        const msgEl = document.getElementById("registerMessage");

        msgEl.classList.add("hidden");

        if (!name || !email || !password) {
            msgEl.textContent = "Preencha todos os campos obrigatorios.";
            msgEl.classList.remove("hidden");
            return;
        }

        const specialties = specialtiesRaw
            ? specialtiesRaw.split(",").map(s => s.trim()).filter(Boolean)
            : [];

        try {
            const res = await fetch("/api/register", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                credentials: "include",
                body: JSON.stringify({ name, email, phone, password, role, specialties })
            });

            const data = await res.json();

            if (!res.ok) {
                msgEl.textContent = data.message || "Erro ao registrar.";
                msgEl.classList.remove("hidden");
                return;
            }

            msgEl.textContent = "Conta criada com sucesso! Redirecionando...";
            msgEl.className = "msg msg-success";

            setTimeout(function() {
                window.location.href = "./login.html";
            }, 1500);
        } catch (err) {
            msgEl.textContent = "Erro de conexao com o servidor.";
            msgEl.classList.remove("hidden");
        }
    }

    document.addEventListener("keydown", function(e) {
        if (e.key === "Enter") register();
    });

    function goLogin() {
        window.location.href = "./login.html";
    }
    </script>
</body>
</html>
