<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Area do Barbeiro - BarberShop</title>
    <link rel="stylesheet" href="style.css"/>
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-inner">
            <a href="/" class="navbar-brand"><span>Barber</span>Shop</a>
            <div class="navbar-links">
                <a class="btn btn-ghost btn-sm" href="/dashbord.html">Meu Painel</a>
                <a id="adminLink" class="btn btn-ghost btn-sm hidden" href="/admin.html">Area Admin</a>
                <button id="logout" class="btn btn-secondary btn-sm">Sair</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- Header -->
        <section class="card fade-in">
            <div style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;">
                <div>
                    <h2>&#9986; Area do Barbeiro</h2>
                    <p id="status" class="text-muted" style="margin-top: 4px;">Carregando...</p>
                </div>
                <span class="badge badge-role">BARBEIRO</span>
            </div>
        </section>

        <!-- Agendamentos -->
        <section class="card fade-in fade-in-delay-1">
            <div class="card-header">
                <h2>&#128203; Agendamentos recebidos</h2>
            </div>
            <p class="text-muted mb-lg">Gerencie os agendamentos dos seus clientes. Confirme, conclua ou cancele.</p>
            <div id="appointments" class="grid"></div>
            <p id="message"></p>
        </section>
    </div>

<script>
const API = "";

async function apiFetch(url, options = {}) {
    const res = await fetch(API + url, {
        credentials: "include",
        headers: { "Content-Type": "application/json", ...options.headers },
        ...options
    });
    const data = await res.json().catch(() => null);
    if (!res.ok) throw new Error(data?.message || "Erro na requisicao");
    return data;
}

function getList(response) {
    return Array.isArray(response) ? response : response?.data || [];
}

function formatDate(value) {
    return new Date(value).toLocaleString("pt-BR", {
        dateStyle: "short", timeStyle: "short"
    });
}

function statusBadge(status) {
    const map = { 'PENDING': 'pending', 'CONFIRMED': 'confirmed', 'DONE': 'done', 'CANCELED': 'canceled' };
    const labels = { 'PENDING': 'Pendente', 'CONFIRMED': 'Confirmado', 'DONE': 'Concluido', 'CANCELED': 'Cancelado' };
    return '<span class="badge badge-' + (map[status] || 'pending') + '">' + (labels[status] || status) + '</span>';
}

async function loadProfile() {
    const res = await apiFetch("/api/profile");
    const user = res.data || res;

    if (!["BARBER", "ADMIN"].includes(user.role)) {
        window.location.href = "/dashbord.html";
        return;
    }

    document.getElementById("status").textContent = user.name + " - Barbeiro";
    document.getElementById("adminLink").classList.toggle("hidden", user.role !== "ADMIN");
}

async function updateStatus(id, status) {
    var msgEl = document.getElementById("message");
    msgEl.className = "msg msg-info";
    msgEl.textContent = "Atualizando...";

    try {
        await apiFetch("/api/appointments/" + id, {
            method: "PUT",
            body: JSON.stringify({ status: status })
        });
        msgEl.className = "msg msg-success";
        msgEl.textContent = "Status atualizado!";
        await loadAppointments();
        setTimeout(function() { msgEl.textContent = ""; msgEl.className = ""; }, 3000);
    } catch (error) {
        msgEl.className = "msg msg-error";
        msgEl.textContent = error.message;
    }
}

async function loadAppointments() {
    const appointments = getList(await apiFetch("/api/appointments"));
    const container = document.getElementById("appointments");
    container.innerHTML = "";

    if (!appointments.length) {
        container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">&#128197;</div><p>Nenhum agendamento encontrado.</p></div>';
        return;
    }

    appointments.forEach(function(appt) {
        var div = document.createElement("div");
        div.className = "item-card";
        div.innerHTML =
            '<div style="display: flex; justify-content: space-between; align-items: start; flex-wrap: wrap; gap: 8px; margin-bottom: 12px;">' +
                '<h3>' + (appt.service?.name || "Servico") + '</h3>' +
                statusBadge(appt.status) +
            '</div>' +
            '<p><strong>Cliente:</strong> ' + (appt.client?.name || "-") + '</p>' +
            '<p><strong>Email:</strong> ' + (appt.client?.email || "-") + '</p>' +
            '<p><strong>Horario:</strong> ' + formatDate(appt.scheduledAt) + '</p>' +
            (appt.notes ? '<p class="text-muted" style="margin-top: 8px; font-style: italic;">' + appt.notes + '</p>' : '') +
            '<div class="divider"></div>' +
            '<div class="btn-group">' +
                '<button class="btn btn-success btn-sm" onclick="updateStatus(' + appt.id + ', \'CONFIRMED\')">Confirmar</button>' +
                '<button class="btn btn-primary btn-sm" onclick="updateStatus(' + appt.id + ', \'DONE\')">Concluir</button>' +
                '<button class="btn btn-danger btn-sm" onclick="updateStatus(' + appt.id + ', \'CANCELED\')">Cancelar</button>' +
            '</div>';
        container.appendChild(div);
    });
}

document.getElementById("logout").onclick = async function() {
    try { await apiFetch("/api/logout", { method: "POST" }); } finally { window.location.href = "/login.html"; }
};

async function init() {
    try {
        await loadProfile();
        await loadAppointments();
    } catch (error) {
        var msgEl = document.getElementById("message");
        msgEl.className = "msg msg-error";
        msgEl.textContent = error.message;
    }
}

init();
</script>
</body>
</html>
