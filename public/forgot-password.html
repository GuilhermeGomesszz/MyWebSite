<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha - BarberShop</title>
    <link rel="stylesheet" href="style.css"/>
    <style>
        .hidden { display: none !important; }
    </style>
</head>

<body>
    <div class="page-center">
        <div class="auth-card fade-in">
            <h2>Recuperar Senha</h2>
            <p class="subtitle" id="flowSubtitle">Insira seu e-mail para receber o código de recuperação</p>

            <!-- ETAPA 1: Solicitar Código -->
            <div id="stepEmail">
                <div class="form-group">
                    <label class="form-label" for="email">E-mail cadastrado</label>
                    <input id="email" type="email" class="form-input" placeholder="seu@email.com">
                </div>

                <p id="emailMessage" class="msg msg-error hidden"></p>

                <button onclick="requestResetCode()" class="btn btn-primary btn-lg" id="sendBtn">
                    Enviar Código
                </button>
            </div>

            <!-- ETAPA 2: Digitar Código e Nova Senha -->
            <div id="stepReset" class="hidden">
                <div class="form-group">
                    <label class="form-label" for="code">Código de 6 dígitos</label>
                    <input id="code" type="text" maxlength="6" class="form-input" placeholder="Digite o código enviado" style="letter-spacing: 4px; text-align: center; font-size: 1.2rem; font-weight: bold;">
                </div>

                <div class="form-group mt-md">
                    <label class="form-label" for="newPassword">Nova Senha</label>
                    <input id="newPassword" type="password" class="form-input" placeholder="Mínimo 6 caracteres">
                </div>

                <div class="form-group mt-md">
                    <label class="form-label" for="confirmPassword">Confirmar Nova Senha</label>
                    <input id="confirmPassword" type="password" class="form-input" placeholder="Repita a nova senha">
                </div>

                <p id="resetMessage" class="msg msg-error hidden"></p>

                <button onclick="resetPassword()" class="btn btn-primary btn-lg" id="resetBtn">
                    Redefinir Senha
                </button>
            </div>

            <p class="auth-link">
                Lembrou a senha? <span onclick="goLogin()">Fazer Login</span>
            </p>
        </div>
    </div>

    <script>
        const API_URL = "http://forgotPassword";
        let userEmail = "";

        async function requestResetCode() {
            const emailInput = document.getElementById("email");
            const email = emailInput.value.trim();
            const msgEl = document.getElementById("emailMessage");
            const sendBtn = document.getElementById("sendBtn");

            msgEl.classList.add("hidden");

            if (!email) {
                msgEl.textContent = "Por favor, digite seu e-mail.";
                msgEl.classList.remove("hidden");
                return;
            }

            sendBtn.disabled = true;
            sendBtn.textContent = "Enviando...";

            try {
                const res = await fetch(`${API_URL}/api/forgot-password`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email })
                });

                const data = await res.json();

                if (res.ok) {
                    userEmail = email;
                    document.getElementById("stepEmail").classList.add("hidden");
                    document.getElementById("stepReset").classList.remove("hidden");
                    document.getElementById("flowSubtitle").textContent = "Insira o código enviado ao seu e-mail e escolha sua nova senha.";
                } else {
                    msgEl.textContent = data.message || "Erro ao solicitar código de recuperação.";
                    msgEl.classList.remove("hidden");
                }
            } catch (err) {
                msgEl.textContent = "Erro de conexão com o servidor.";
                msgEl.classList.remove("hidden");
            } finally {
                sendBtn.disabled = false;
                sendBtn.textContent = "Enviar Código";
            }
        }

        async function resetPassword() {
            const code = document.getElementById("code").value.trim();
            const newPassword = document.getElementById("newPassword").value;
            const confirmPassword = document.getElementById("confirmPassword").value;
            const msgEl = document.getElementById("resetMessage");
            const resetBtn = document.getElementById("resetBtn");

            msgEl.className = "msg msg-error hidden";

            if (!code || !newPassword || !confirmPassword) {
                msgEl.textContent = "Preencha todos os campos.";
                msgEl.classList.remove("hidden");
                return;
            }

            if (newPassword.length < 6) {
                msgEl.textContent = "A nova senha deve ter no mínimo 6 caracteres.";
                msgEl.classList.remove("hidden");
                return;
            }

            if (newPassword !== confirmPassword) {
                msgEl.textContent = "As senhas não coincidem.";
                msgEl.classList.remove("hidden");
                return;
            }

            resetBtn.disabled = true;
            resetBtn.textContent = "Redefinindo...";

            try {
                const res = await fetch(`${API_URL}/api/reset-password`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email: userEmail, code, newPassword })
                });

                const data = await res.json();

                if (res.ok) {
                    msgEl.textContent = "Senha redefinida com sucesso! Redirecionando para o login...";
                    msgEl.className = "msg msg-success";
                    msgEl.classList.remove("hidden");

                    setTimeout(function() {
                        window.location.href = "./login.html";
                    }, 2000);
                } else {
                    msgEl.textContent = data.message || "Erro ao redefinir a senha.";
                    msgEl.classList.remove("hidden");
                }
            } catch (err) {
                msgEl.textContent = "Erro de conexão com o servidor.";
                msgEl.classList.remove("hidden");
            } finally {
                resetBtn.disabled = false;
                resetBtn.textContent = "Redefinir Senha";
            }
        }

        function goLogin() {
            window.location.href = "./login.html";
        }
    </script>
</body>
</html>
