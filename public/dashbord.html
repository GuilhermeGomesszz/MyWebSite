<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Dashboard - BarberShop</title>
    <link rel="stylesheet" href="style.css"/>
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-inner">
            <a href="/" class="navbar-brand"><span>Barber</span>Shop</a>
            <div class="navbar-links">
                <a id="barberLink" class="btn btn-ghost btn-sm hidden" href="/barber.html">Area Barbeiro</a>
                <a id="adminLink" class="btn btn-ghost btn-sm hidden" href="/admin.html">Area Admin</a>
                <button id="logout" class="btn btn-secondary btn-sm">Sair</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- Welcome -->
        <section class="card fade-in">
            <div class="header-row">
                <div>
                    <h2 id="welcome">Carregando...</h2>
                    <p id="status" class="text-muted mt-sm"></p>
                </div>
                <span class="badge badge-role hidden" id="roleBadge"></span>
            </div>
        </section>

        <!-- Form de agendamento -->
        <section class="card fade-in fade-in-delay-1">
            <div class="card-header">
                <h2>&#128197; Novo agendamento</h2>
            </div>

            <form id="appointmentForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label" for="serviceId">Servico</label>
                        <select id="serviceId" class="form-select" required>
                            <option value="">Selecione um servico</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="barberId">Barbeiro</label>
                        <select id="barberId" class="form-select" required>
                            <option value="">Selecione um barbeiro</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="scheduledAt">Data e hora</label>
                        <input id="scheduledAt" type="datetime-local" class="form-input" required>
                    </div>
                </div>

                <div class="form-group mt-md">
                    <label class="form-label" for="notes">Observacoes (opcional)</label>
                    <textarea id="notes" class="form-textarea" placeholder="Ex: corte baixo, barba desenhada..."></textarea>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Agendar</button>
                    <p id="formMessage"></p>
                </div>
            </form>
        </section>

        <!-- Servicos -->
        <section class="card fade-in fade-in-delay-2">
            <div class="card-header">
                <h2>&#9986; Servicos disponiveis</h2>
                <a href="/services.html" class="btn btn-ghost btn-sm">Ver todos</a>
            </div>
            <div id="services" class="grid"></div>
            <p id="servicesError" class="msg-muted"></p>
        </section>

        <!-- Agendamentos -->
        <section class="card fade-in fade-in-delay-3">
            <div class="card-header">
                <h2>&#128203; Meus agendamentos</h2>
            </div>
            <div id="appointments" class="grid"></div>
            <p id="appointmentsError" class="msg-muted"></p>
        </section>
    </div>

<script>
const API = "";

async function apiFetch(url, options = {}) {
    const res = await fetch(API + url, {
        credentials: "include",
        headers: { "Content-Type": "application/json", ...options.headers },
        ...options
    });
    const data = await res.json().catch(() => null);
    if (!res.ok) throw new Error(data?.message || "Erro na requisicao");
    return data;
}

function getList(response) {
    return Array.isArray(response) ? response : response?.data || [];
}

function formatDate(value) {
    return new Date(value).toLocaleString("pt-BR", {
        dateStyle: "short", timeStyle: "short"
    });
}

function statusBadge(status) {
    const map = {
        'PENDING': 'pending',
        'CONFIRMED': 'confirmed',
        'DONE': 'done',
        'CANCELED': 'canceled'
    };
    const cls = map[status] || 'pending';
    const labels = {
        'PENDING': 'Pendente',
        'CONFIRMED': 'Confirmado',
        'DONE': 'Concluido',
        'CANCELED': 'Cancelado'
    };
    return '<span class="badge badge-' + cls + '">' + (labels[status] || status) + '</span>';
}

async function loadProfile() {
    const res = await apiFetch("/api/profile");
    const user = res.data || res;

    document.getElementById("welcome").textContent = "Ola, " + user.name;
    document.getElementById("status").textContent = "Bem-vindo ao seu painel de agendamentos";

    var roleBadge = document.getElementById("roleBadge");
    roleBadge.textContent = user.role;
    roleBadge.style.display = "";

    document.getElementById("barberLink").classList.toggle("hidden", !["BARBER", "ADMIN"].includes(user.role));
    document.getElementById("adminLink").classList.toggle("hidden", user.role !== "ADMIN");
}

async function loadServices() {
    const services = getList(await apiFetch("/api/services"));
    const container = document.getElementById("services");
    const select = document.getElementById("serviceId");

    container.innerHTML = "";
    select.innerHTML = '<option value="">Selecione um servico</option>';

    if (!services.length) {
        container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">&#128566;</div><p>Nenhum servico cadastrado ainda.</p></div>';
        return;
    }

    services.forEach(function(service) {
        select.insertAdjacentHTML("beforeend",
            '<option value="' + service.id + '">' + service.name + ' - R$ ' + (service.priceInCents / 100).toFixed(2) + '</option>'
        );

        var div = document.createElement("div");
        div.className = "item-card";
        div.innerHTML =
            '<h3>' + service.name + '</h3>' +
            '<p>' + (service.description || "") + '</p>' +
            '<span class="duration">&#9202; ' + service.durationMinutes + ' min</span>' +
            '<div class="price">R$ ' + (service.priceInCents / 100).toFixed(2) + '</div>';
        container.appendChild(div);
    });
}

async function loadBarbers() {
    const barbers = getList(await apiFetch("/api/barbers"));
    const select = document.getElementById("barberId");
    select.innerHTML = '<option value="">Selecione um barbeiro</option>';

    barbers.forEach(function(barber) {
        select.insertAdjacentHTML("beforeend", '<option value="' + barber.id + '">' + barber.name + '</option>');
    });
}

async function loadAppointments() {
    const appointments = getList(await apiFetch("/api/appointments"));
    const container = document.getElementById("appointments");
    container.innerHTML = "";

    if (!appointments.length) {
        container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">&#128197;</div><p>Voce ainda nao tem agendamentos.</p></div>';
        return;
    }

    appointments.forEach(function(appt) {
        var div = document.createElement("div");
        div.className = "item-card";
        div.innerHTML =
            '<div style="display: flex; justify-content: space-between; align-items: start; flex-wrap: wrap; gap: 8px; margin-bottom: 12px;">' +
                '<h3>' + (appt.service?.name || "Servico") + '</h3>' +
                statusBadge(appt.status) +
            '</div>' +
            '<p><strong>Barbeiro:</strong> ' + (appt.barber?.name || "-") + '</p>' +
            '<p><strong>Horario:</strong> ' + formatDate(appt.scheduledAt) + '</p>' +
            (appt.notes ? '<p class="text-muted" style="margin-top: 8px; font-style: italic;">' + appt.notes + '</p>' : '');
        container.appendChild(div);
    });
}

document.getElementById("appointmentForm").addEventListener("submit", async function(event) {
    event.preventDefault();
    var message = document.getElementById("formMessage");
    message.className = "msg msg-info";
    message.textContent = "Criando agendamento...";

    try {
        var scheduledAt = document.getElementById("scheduledAt").value;

        await apiFetch("/api/appointments", {
            method: "POST",
            body: JSON.stringify({
                serviceId: Number(document.getElementById("serviceId").value),
                barberId: Number(document.getElementById("barberId").value),
                scheduledAt: new Date(scheduledAt).toISOString(),
                notes: document.getElementById("notes").value || undefined
            })
        });

        event.target.reset();
        message.className = "msg msg-success";
        message.textContent = "Agendamento criado com sucesso!";
        await loadAppointments();

        setTimeout(function() { message.textContent = ""; message.className = ""; }, 4000);
    } catch (error) {
        message.className = "msg msg-error";
        message.textContent = error.message;
    }
});

document.getElementById("logout").onclick = async function() {
    try {
        await apiFetch("/api/logout", { method: "POST" });
    } finally {
        window.location.href = "/login.html";
    }
};

async function init() {
    try {
        await loadProfile();
        await Promise.all([loadServices(), loadBarbers(), loadAppointments()]);
    } catch (error) {
        window.location.href = "/login.html";
    }
}

init();
</script>
</body>
</html>
