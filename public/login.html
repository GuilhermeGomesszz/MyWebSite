<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BarberShop</title>
    <link rel="stylesheet" href="style.css"/>
</head>

<body>
    <div class="page-center">
        <div class="auth-card fade-in">
            <h2>Bem-vindo de volta</h2>
            <p class="subtitle">Entre na sua conta para agendar</p>

            <div class="form-group">
                <label class="form-label" for="email">Email</label>
                <input id="email" type="email" class="form-input" placeholder="seu@email.com">
            </div>

            <div class="form-group mt-md">
                <div class="header-row" style="margin-bottom: var(--space-xs);">
                    <label class="form-label" for="password" style="margin-bottom: 0;">Senha</label>
                    <span class="text-link" onclick="goForgotPassword()">Esqueci minha senha?</span>
                </div>
                <input id="password" type="password" class="form-input" placeholder="Sua senha">
            </div>

            <p id="loginMessage" class="msg msg-error hidden"></p>

            <button onclick="login()" class="btn btn-primary btn-lg" id="loginBtn">
                Entrar
            </button>

            <p class="auth-link">
                Não tem conta? <span class="text-link" onclick="goRegister()">Criar conta</span>
            </p>
        </div>
    </div>

    <script>
    async function login() {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const msgEl = document.getElementById("loginMessage");

        msgEl.classList.add("hidden");

        if (!email || !password) {
            msgEl.textContent = "Preencha todos os campos.";
            msgEl.classList.remove("hidden");
            return;
        }

        try {
            const res = await fetch("/api/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                credentials: "include",
                body: JSON.stringify({ email, password })
            });

            const data = await res.json().catch(() => null);

            if (res.ok && data?.status === "success") {
                const role = data.data?.role;

                if (role === "ADMIN") {
                    window.location.href = "/admin.html";
                    return;
                }

                if (role === "BARBER") {
                    window.location.href = "/barber.html";
                    return;
                }

                window.location.href = "/dashbord.html";
            } else {
                msgEl.textContent = data?.message || "Erro ao fazer login.";
                msgEl.classList.remove("hidden");
            }
        } catch (err) {
            msgEl.textContent = "Erro de conexao com o servidor.";
            msgEl.classList.remove("hidden");
        }
    }

    document.addEventListener("keydown", function(e) {
        if (e.key === "Enter") login();
    });

    function goRegister() {
        window.location.href = "./register.html";
    }

    function goForgotPassword() {
        window.location.href = "./forgot-password.html";
    }
    </script>
</body>
</html>
