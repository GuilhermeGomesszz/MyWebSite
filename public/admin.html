<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Area Admin - BarberShop</title>
    <link rel="stylesheet" href="style.css"/>
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-inner">
            <a href="/" class="navbar-brand"><span>Barber</span>Shop</a>
            <div class="navbar-links">
                <a class="btn btn-ghost btn-sm" href="/dashbord.html">Meu Painel</a>
                <a class="btn btn-ghost btn-sm" href="/barber.html">Area Barbeiro</a>
                <button id="logout" class="btn btn-secondary btn-sm">Sair</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- Header -->
        <section class="card fade-in">
            <div style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;">
                <div>
                    <h2>&#128272; Area Admin</h2>
                    <p id="status" class="text-muted" style="margin-top: 4px;">Carregando...</p>
                </div>
                <span class="badge badge-role">ADMIN</span>
            </div>
        </section>

        <!-- Promover usuarios -->
        <section class="card fade-in fade-in-delay-1">
            <div class="card-header">
                <h2>&#11088; Promover para Admin</h2>
            </div>
            <p class="text-muted mb-lg">Selecione um barbeiro para promover ao cargo de administrador. Apenas admins acessam esta funcionalidade.</p>
            <div id="users" class="grid"></div>
            <p id="message"></p>
        </section>
    </div>

<script>
const API = "http://localhost:3000";

async function apiFetch(url, options = {}) {
    const res = await fetch(API + url, {
        credentials: "include",
        headers: { "Content-Type": "application/json", ...options.headers },
        ...options
    });
    const data = await res.json().catch(() => null);
    if (!res.ok) throw new Error(data?.message || "Erro na requisicao");
    return data;
}

function getList(response) {
    return Array.isArray(response) ? response : response?.data || [];
}

async function loadProfile() {
    const res = await apiFetch("/api/profile");
    const user = res.data || res;

    if (user.role !== "ADMIN") {
        window.location.href = "/dashbord.html";
        return;
    }

    document.getElementById("status").textContent = user.name + " - Administrador";
}

async function promoteUser(id) {
    var msgEl = document.getElementById("message");
    msgEl.className = "msg msg-info";
    msgEl.textContent = "Promovendo usuario...";

    try {
        await apiFetch("/api/users/" + id + "/promote-admin", { method: "PATCH" });
        msgEl.className = "msg msg-success";
        msgEl.textContent = "Usuario promovido para admin com sucesso!";
        await loadUsers();
        setTimeout(function() { msgEl.textContent = ""; msgEl.className = ""; }, 4000);
    } catch (error) {
        msgEl.className = "msg msg-error";
        msgEl.textContent = error.message;
    }
}

async function loadUsers() {
    const users = getList(await apiFetch("/api/users"));
    const container = document.getElementById("users");
    container.innerHTML = "";

    const barbers = users.filter(function(u) { return u.role === "BARBER"; });

    if (!barbers.length) {
        container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">&#128100;</div><p>Nenhum barbeiro disponivel para promover.</p></div>';
        return;
    }

    barbers.forEach(function(user) {
        var div = document.createElement("div");
        div.className = "item-card";
        div.innerHTML =
            '<h3>' + user.name + '</h3>' +
            '<p>' + user.email + '</p>' +
            '<p><strong>Funcao:</strong> <span class="badge badge-role">' + user.role + '</span></p>' +
            '<div class="divider"></div>' +
            '<button class="btn btn-primary btn-sm" onclick="promoteUser(' + user.id + ')">Promover para Admin</button>';
        container.appendChild(div);
    });
}

document.getElementById("logout").onclick = async function() {
    try { await apiFetch("/api/logout", { method: "POST" }); } finally { window.location.href = "/login.html"; }
};

async function init() {
    try {
        await loadProfile();
        await loadUsers();
    } catch (error) {
        var msgEl = document.getElementById("message");
        msgEl.className = "msg msg-error";
        msgEl.textContent = error.message;
    }
}

init();
</script>
</body>
</html>
